    <script src="owl.carousel.min.js"></script>




    <script>




        $(document).ready(function () {
            var owl = $('#sai');
            owl.owlCarousel({
                loop: true,
                nav: true,
                margin: 10,
                autoplay: true,
                autoplayTimeout: 10000,
                responsive: {

                    0: {

                        items: 1
                    },
                    375: {

                        items: 2
                    },
                    600: {

                        items: 4
                    },
                    960: {

                        items: 5
                    },
                    1200: {

                        items: 5
                    }
                }
            });
        });

        // homepage ban hover effect

        $(document).ready(function () {
            $(".ban .row .bancol .card").mouseover(function () {
                $(this).addClass("banhov");
                $(this).removeClass("banhovout");
            });
            $(".ban .row .bancol .card").mouseout(function () {
                $(this).removeClass("banhov");
                $(this).addClass("banhovout");
            });
        });












    </script>
